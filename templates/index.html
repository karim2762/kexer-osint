<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KEXER OSINT</title>
<link rel="stylesheet" href="/static/style.css">

<style>
body{
background:#020617;
color:white;
font-family:system-ui;
margin:0;
}

.container{
max-width:500px;
margin:auto;
padding:20px;
text-align:center;
}

.logo{
color:#00ff9c;
font-size:32px;
margin-bottom:5px;
}

.tag{
color:#94a3b8;
margin-bottom:25px;
}

input{
width:100%;
padding:14px;
border-radius:10px;
border:none;
margin-bottom:12px;
font-size:16px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#00ff9c;
font-weight:700;
font-size:16px;
}

footer{
margin-top:30px;
font-size:12px;
color:#64748b;
}
</style>
</head>

<body>

<div class="container">

<h1 class="logo">KEXER</h1>
<p class="tag">Advanced OSINT Username Scanner</p>

<form action="/scan">
<input name="username" placeholder="Enter username" required>
<button>Start Scan</button>
</form>

<footer>
Kexer Intelligence Engine
</footer>

</div>

</body>
</html>
